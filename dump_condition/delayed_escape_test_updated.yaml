simulation:
  name: "delayed_escape_test_new"
  random_seed: 0
  output_dir: "outputs"
  dump: true

units:
  time: "yr"
  length: "AU"
  mass: "Msun"

integration:
  integrator: "mercurius"
  timestep_fraction_of_planet_period: 0.1
  maxtime: 2000.0
  Noutputs: 50
  exit_max_distance: 100.0

star:
  mass: 1.28

giant_planet:
  mass_jupiter: 1.26
  a: 2.56
  e: 0.07
  inc_deg: 0.01
  omega_deg: 100.0
  Omega_random: true

  t_peri_jd: 2450870.0
  orbital_period_days: 1311.0
  epoch_jd: 2451545.0

disk:
  amin: 30.0
  amax: 50.0
  emin: 0.0
  emax: 3.5e-6
  imin_deg: 0.0
  imax_deg: 3.5e-6

massive_planetesimals:
  N: 4
  mass_fraction_of_giant_planet: 0.0005
  #total_mass_earth: 0.8

test_particles:
  N: 10
  distribution: "uniform"

plots:
  dpi: 200

  scale:
    x: "linear"
    y: "linear"

  limits:
    #mode: "auto"
    mode: "manual"
    ae:
      xlim: null
      ylim: [0,0.2]

    ai:
      xlim: null
      ylim: null

    e_evolution:
      xlim: null
      ylim: null

    i_evolution:
      xlim: null
      ylim: null

    a_evolution:
      xlim: null
      ylim: null

    survival:
      xlim: null
      ylim: null

  final_conditions:
    output_file: "outputs/FinalConditions.png"
